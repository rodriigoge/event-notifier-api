spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5433/event_notifier}
    username: ${DATASOURCE_USERNAME:event}
    password: ${DATASOURCE_PASSWORD:event}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: ${PORT:8082}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always